[profile.default]
solc_version = "0.8.34"
evm_version = "cancun"
eth_rpc_url = "https://ethereum-rpc.publicnode.com"

optimizer = true
optimizer_runs = 9_999_999

remappings = [
  "@solady=lib/solady/",
  "@forge=lib/forge-std/src/"
]

[profile.via-ir]
via_ir = true

[fmt]
line_length = 100

[rpc_endpoints]
main = "https://ethereum-rpc.publicnode.com"